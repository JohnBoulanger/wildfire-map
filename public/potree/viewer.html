<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Point Cloud Viewer</title>
  <link rel="stylesheet" type="text/css" href="build/potree/potree.css">
  <link rel="stylesheet" type="text/css" href="libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" type="text/css" href="libs/openlayers3/ol.css">
  <link rel="stylesheet" type="text/css" href="libs/spectrum/spectrum.css">
  <link rel="stylesheet" type="text/css" href="libs/jstree/themes/mixed/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    .potree_container { position: absolute; width: 100%; height: 100%; }
    #potree_render_area { background: #1a1a2e; }
    /* Hide Potree sidebar and toolbar */
    #potree_sidebar_container { display: none !important; }
    .potree_toolbar { display: none !important; }

    /* Compass overlay */
    #compass {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 72px;
      height: 72px;
      z-index: 1000;
      pointer-events: none;
    }
    #compass-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    }
    #compass-ring .label {
      position: absolute;
      font-family: sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      transform: translate(-50%, -50%);
    }
    #compass-ring .label-n {
      top: 12px; left: 50%;
      color: #ff4444;
      font-size: 12px;
      font-weight: 700;
    }
    #compass-ring .label-s { bottom: -2px; left: 50%; top: auto; transform: translate(-50%, -50%); top: 60px; }
    #compass-ring .label-e { top: 50%; right: -2px; left: auto; transform: translate(-50%, -50%); left: 60px; }
    #compass-ring .label-w { top: 50%; left: 12px; }
    #compass-needle-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      /* CSS transform set by JS */
    }
    #compass-needle-wrap .north {
      position: absolute;
      left: 50%;
      top: 22px;
      width: 0; height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-bottom: 13px solid #ff4444;
      transform: translateX(-50%);
      opacity: 0.9;
    }
    #compass-needle-wrap .south {
      position: absolute;
      left: 50%;
      top: 35px;
      width: 0; height: 0;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      border-top: 13px solid rgba(255,255,255,0.5);
      transform: translateX(-50%);
    }

    /* Scale bar overlay */
    #scale-bar {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 1000;
      pointer-events: none;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    }
    #scale-bar-line {
      height: 2px;
      background: #fff;
      margin-top: 3px;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    #scale-bar-line::before,
    #scale-bar-line::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 6px;
      background: #fff;
      top: -2px;
    }
    #scale-bar-line::before { left: 0; }
    #scale-bar-line::after { right: 0; }
  </style>
</head>
<body>
  <script src="libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="libs/spectrum/spectrum.js"></script>
  <script src="libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="libs/other/BinaryHeap.js"></script>
  <script src="libs/tween/tween.min.js"></script>
  <script src="libs/d3/d3.js"></script>
  <script src="libs/proj4/proj4.js"></script>
  <script src="libs/openlayers3/ol.js"></script>
  <script src="libs/i18next/i18next.js"></script>
  <script src="libs/jstree/jstree.js"></script>
  <script src="libs/copc/index.js"></script>
  <script src="build/potree/potree.js"></script>
  <script src="libs/plasio/js/laslaz.js"></script>

  <div class="potree_container">
    <div id="potree_render_area"></div>
    <div id="potree_sidebar_container"></div>
  </div>

  <!-- Compass -->
  <div id="compass">
    <div id="compass-ring">
      <span class="label label-n">N</span>
      <span class="label label-s">S</span>
      <span class="label label-e">E</span>
      <span class="label label-w">W</span>
      <div id="compass-needle-wrap">
        <div class="north"></div>
        <div class="south"></div>
      </div>
    </div>
  </div>

  <!-- Scale bar -->
  <div id="scale-bar">
    <span id="scale-label">0 m</span>
    <div id="scale-bar-line" style="width: 80px;"></div>
  </div>

  <script type="module">
    import * as THREE from "./libs/three.js/build/three.module.js";

    const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
    viewer.setEDLEnabled(true);
    viewer.setFOV(60);
    viewer.setPointBudget(2_000_000);
    viewer.setBackground("gradient");

    // Get EPT path from query parameter or use default
    const params = new URLSearchParams(window.location.search);
    const eptPath = params.get("ept") || "/pointcloud/entwine_pointcloud/ept.json";

    // Read optional arrow coordinates from query params
    const arrowX = params.has("arrowX") ? parseFloat(params.get("arrowX")) : null;
    const arrowY = params.has("arrowY") ? parseFloat(params.get("arrowY")) : null;
    const arrowZ = params.has("arrowZ") ? parseFloat(params.get("arrowZ")) : null;
    const hasArrowCoords = arrowX !== null && arrowY !== null && arrowZ !== null;

    Potree.loadPointCloud(eptPath, "pointcloud", function(e) {
      viewer.scene.addPointCloud(e.pointcloud);

      const material = e.pointcloud.material;
      material.size = 1;
      material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
      material.activeAttributeName = "rgba";

      viewer.fitToScreen(0.5);

      // Add arrow annotation
      const bb = e.pointcloud.boundingBox;
      const center = bb.getCenter(new THREE.Vector3());
      const size = bb.getSize(new THREE.Vector3());

      // Use provided coords or fall back to an offset position within the bounding box
      const arrowTarget = hasArrowCoords
        ? new THREE.Vector3(arrowX, arrowY, arrowZ)
        : center.clone().add(new THREE.Vector3(size.x * 0.25, size.y * -0.15, 0));

      // Arrow hovers above the target and points down
      const arrowLength = size.length() * 0.15;
      const direction = new THREE.Vector3(0, 0, -1); // pointing down (Z-up in Potree)
      const origin = arrowTarget.clone().add(new THREE.Vector3(0, 0, arrowLength * 1.2));

      const arrowColor = 0xff3333;
      const headLength = arrowLength * 0.18;  // shorter head
      const headWidth = headLength * 0.6;     // narrower head
      const arrow = new THREE.ArrowHelper(
        direction,
        origin,
        arrowLength,
        arrowColor,
        headLength,
        headWidth,
      );

      // Thicken the shaft line
      arrow.line.material.linewidth = 3;
      // Replace thin Line with a cylinder for a visible thick shaft
      const shaftLength = arrowLength - headLength;
      const shaftRadius = headWidth * 0.12;
      const shaftGeo = new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 12);
      const shaftMat = new THREE.MeshBasicMaterial({ color: arrowColor });
      const shaftMesh = new THREE.Mesh(shaftGeo, shaftMat);
      // Position shaft: cylinder is centered at origin, so offset along local Z
      shaftMesh.position.set(0, shaftLength / 2, 0);
      // Remove the default thin line and add the cylinder shaft instead
      arrow.remove(arrow.line);
      arrow.add(shaftMesh);

      viewer.scene.scene.add(arrow);

      // --- Compass & scale bar update loop ---
      const needle = document.getElementById("compass-needle-wrap");
      const scaleLabel = document.getElementById("scale-label");
      const scaleLine = document.getElementById("scale-bar-line");
      const scaleBarWidth = 80; // px

      function updateOverlays() {
        requestAnimationFrame(updateOverlays);

        // Compass: derive camera heading, then counter-rotate needle so it always points north
        const cam = viewer.scene.getActiveCamera();
        const dir = new THREE.Vector3();
        cam.getWorldDirection(dir);
        // Camera heading: angle from Y-axis (north) clockwise
        const cameraHeading = Math.atan2(dir.x, dir.y) * (180 / Math.PI);
        // Negate so the needle points TOWARD north, not with the camera
        needle.style.transform = `rotate(${-cameraHeading}deg)`;

        // Scale bar: estimate world-space distance for scaleBarWidth pixels
        const renderArea = document.getElementById("potree_render_area");
        const vpWidth = renderArea.clientWidth;
        // Use two points at screen center offset by scaleBarWidth
        const cx = vpWidth / 2;
        const cy = renderArea.clientHeight / 2;
        const left = new THREE.Vector3((cx - scaleBarWidth / 2) / vpWidth * 2 - 1, 0, 0.5);
        const right = new THREE.Vector3((cx + scaleBarWidth / 2) / vpWidth * 2 - 1, 0, 0.5);
        left.unproject(cam);
        right.unproject(cam);
        const dist = left.distanceTo(right);

        // Pick nice round number
        const niceUnits = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000];
        let bestVal = dist;
        for (const n of niceUnits) {
          if (n <= dist * 1.2) bestVal = n;
        }
        const ratio = bestVal / dist;
        const barPx = Math.round(scaleBarWidth * ratio);
        scaleLine.style.width = barPx + "px";
        scaleLabel.textContent = bestVal >= 1000 ? (bestVal / 1000) + " km" : bestVal + " m";
      }
      updateOverlays();
    });
  </script>
</body>
</html>
